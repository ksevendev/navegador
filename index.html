<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Simulador de Estudos</title>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, Roboto, sans-serif; }
        body, html { height: 100%; overflow: hidden; background: #000; }

        .app-container { display: flex; height: 100vh; width: 100vw; background: #fff; transition: flex-direction 0.3s; }
        
        /* Modos de exibição */
        .mode-safari { flex-direction: column-reverse; }
        .mode-chrome { flex-direction: column; }

        /* --- BARRA DE NAVEGAÇÃO --- */
        .nav-bar { display: flex; align-items: center; padding: 10px 15px; position: relative; background: #fff; z-index: 10; }
        
        .mode-safari .nav-bar { 
            background: rgba(248, 248, 248, 0.9); 
            backdrop-filter: blur(20px); 
            border-top: 0.5px solid #ccc;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
        }

        .mode-chrome .nav-bar { 
            border-bottom: 1px solid #eee; 
            padding-top: calc(10px + env(safe-area-inset-top)); 
        }

        /* Input de URL */
        .address-group { flex: 1; position: relative; display: flex; align-items: center; margin: 0 10px; }
        
        .url-input {
            width: 100%;
            height: 38px;
            border: none;
            outline: none;
            padding: 0 35px;
            font-size: 16px;
            color: #333;
        }

        .mode-safari .url-input { background: rgba(0,0,0,0.05); border-radius: 10px; text-align: center; }
        .mode-chrome .url-input { background: #f1f3f4; border-radius: 20px; text-align: left; }

        /* Botões */
        .btn { border: none; background: none; cursor: pointer; color: #007aff; font-size: 20px; display: flex; align-items: center; }
        .mode-chrome .btn { color: #5f6368; }

        /* Ícone de Atualizar com Animação */
        .refresh-icon { transition: transform 0.5s ease; }
        .refreshing { transform: rotate(360deg); }

        /* Barra de Progresso */
        #progress {
            position: absolute;
            height: 2px;
            background: #007aff;
            width: 0%;
            top: 0;
            left: 0;
            transition: width 0.3s, opacity 0.3s;
        }

        /* IFRAME */
        .content { flex: 1; width: 100%; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="app-container" id="simulador">
    <header class="nav-bar">
        <button class="btn only-safari" style="font-size: 14px;">AA</button>
        
        <div class="address-group">
            <span style="position: absolute; left: 12px; font-size: 12px;">🔒</span>
            <input type="text" class="url-input" id="browser-url" value="google.com" spellcheck="false">
            <button class="btn refresh-icon" id="btn-refresh" style="position: absolute; right: 12px; font-size: 16px;">↻</button>
        </div>

        <button class="btn only-chrome">⋮</button>
    </header>

    <main class="content">
        <div id="progress"></div>
        <iframe src="https://demo.gamipg.online/" id="target-frame"></iframe>
    </main>
</div>

<script>
    const iframe = document.getElementById('target-frame');
    const progressBar = document.getElementById('progress');
    const refreshBtn = document.getElementById('btn-refresh');
    const urlInput = document.getElementById('browser-url');
    const simulador = document.getElementById('simulador');

    // 1. Identificar Navegador e Ajustar Layout
    function setupTheme() {
        const ua = navigator.userAgent;
        if (/iPhone|iPad|iPod/i.test(ua) && /Safari/i.test(ua) && !/CriOS/i.test(ua)) {
            simulador.classList.add('mode-safari');
        } else {
            simulador.classList.add('mode-chrome');
        }
    }

    // 2. Função de "Carregamento" Visual
    function simulateLoading() {
        refreshBtn.classList.add('refreshing');
        progressBar.style.opacity = '1';
        progressBar.style.width = '0%';
        
        setTimeout(() => progressBar.style.width = '50%', 200);
        setTimeout(() => progressBar.style.width = '85%', 600);
        
        // Recarrega o iframe de fato
        iframe.src = iframe.src; 

        setTimeout(() => {
            progressBar.style.width = '100%';
            setTimeout(() => {
                progressBar.style.opacity = '0';
                refreshBtn.classList.remove('refreshing');
            }, 300);
        }, 1000);
    }

    // 3. Eventos
    refreshBtn.onclick = simulateLoading;

    urlInput.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            simulateLoading();
            this.blur(); // Tira o foco do teclado
        }
    });

    // Manter a URL fixa visualmente mesmo se clicarem
    urlInput.onfocus = function() {
        this.select(); // Facilita "fingir" que vai digitar outro site
    };

    setupTheme();
</script>

</body>
</html>
