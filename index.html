<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Web Simulator</title>
    <link rel="manifest" href="manifest.json">
    
    <style>
        :root { --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; overflow: hidden; background: #000; font-family: -apple-system, Roboto, sans-serif; }

        .app-shell { display: flex; height: 100vh; width: 100vw; background: #fff; }

        /* --- LÓGICA DE POSICIONAMENTO --- */
        .app-shell.layout-bottom { flex-direction: column-reverse; } /* Safari iOS */
        .app-shell.layout-top { flex-direction: column; } /* Chrome, Brave, Firefox */

        .viewport { flex-grow: 1; width: 100%; position: relative; background: #fff; }
        iframe { width: 100%; height: 100%; border: none; }

        /* --- BARRA DE NAVEGAÇÃO --- */
        .nav-bar { display: flex; align-items: center; width: 100%; position: relative; z-index: 10; padding: 10px 15px; }

        /* Estilo Safari (iOS) */
        .theme-safari .nav-bar {
            background: rgba(245, 245, 245, 0.9);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top: 0.5px solid #b5b5b5;
            padding-bottom: calc(10px + var(--safe-bottom));
        }
        .theme-safari .address-box {
            background: rgba(0,0,0,0.06); border-radius: 12px; height: 42px;
            flex: 1; margin: 0 10px; display: flex; align-items: center; justify-content: center;
        }

        /* Estilo Chrome/Android */
        .theme-chrome .nav-bar {
            background: #fff; border-bottom: 1px solid #eee;
            padding-top: calc(10px + var(--safe-top));
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .theme-chrome .address-box {
            background: #f1f3f4; border-radius: 24px; height: 42px;
            flex: 1; margin: 0 10px; display: flex; align-items: center; padding: 0 15px;
        }

        /* Input Invisível */
        .url-input {
            width: 100%; border: none; background: transparent; outline: none;
            font-size: 16px; color: #202124;
        }
        .theme-safari .url-input { text-align: center; }

        /* UI Helpers */
        .icon { display: none; cursor: pointer; }
        .theme-safari .icon-safari { display: block; color: #007aff; }
        .theme-chrome .icon-chrome { display: block; color: #5f6368; }

        /* Barra de Progresso */
        #progress {
            position: absolute; left: 0; height: 2px; background: #1a73e8; width: 0%;
            transition: width 0.4s ease, opacity 0.3s;
        }
        .layout-bottom #progress { top: 0; }
        .layout-top #progress { bottom: 0; }
    </style>
</head>
<body>

<div class="app-shell" id="shell">
    <header class="nav-bar">
        <div class="icon icon-safari" style="font-size: 14px;">AA</div>
        
        <div class="address-box">
            <span class="icon-safari" style="margin-right: 5px; font-size: 12px;">🔒</span>
            <input type="text" id="url-field" class="url-input" value="google.com.br" spellcheck="false">
        </div>

        <div class="icon icon-safari" id="ref-ios" style="font-size: 20px;">↻</div>
        <div class="icon icon-chrome" id="ref-and" style="font-size: 20px;">⋮</div>

        <div id="progress"></div>
    </header>

    <main class="viewport">
        <iframe src="https://demo.gamipg.online/" id="content-frame"></iframe>
    </main>
</div>

<script>
    const shell = document.getElementById('shell');
    const input = document.getElementById('url-field');
    const frame = document.getElementById('content-frame');
    const progress = document.getElementById('progress');

    function initSimulator() {
        const ua = navigator.userAgent;
        
        // 1. Detecção de PWA Instalado
        const isPWA = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

        // 2. Detecção de Navegador e SO
        const isIOS = /iPad|iPhone|iPod/.test(ua);
        const isSafari = isIOS && /Safari/i.test(ua) && !/CriOS/i.test(ua);
        const isFirefox = /Firefox/i.test(ua);
        const isBrave = navigator.brave !== undefined;

        // 3. Aplicação Inteligente de Temas
        if (isSafari) {
            shell.classList.add('theme-safari', 'layout-bottom');
        } else {
            shell.classList.add('theme-chrome', 'layout-top');
        }

        // Se for Firefox ou Brave, podemos ajustar detalhes específicos aqui
        if (isFirefox) console.log("Ajustes para Firefox aplicados");
    }

    function loadEffect() {
        progress.style.opacity = '1';
        progress.style.width = '40%';
        setTimeout(() => progress.style.width = '90%', 500);
        
        // Força o reload do iframe estático
        frame.src = frame.src;

        setTimeout(() => {
            progress.style.width = '100%';
            setTimeout(() => { progress.style.opacity = '0'; progress.style.width = '0%'; }, 300);
        }, 1000);
    }

    input.addEventListener('keypress', (e) => { if (e.key === 'Enter') { loadEffect(); input.blur(); } });
    document.getElementById('ref-ios').onclick = loadEffect;
    document.getElementById('ref-and').onclick = loadEffect;

    // Impedir comportamento de "puxar para atualizar" nativo do navegador
    document.body.addEventListener('touchmove', (e) => {
        if (!e.target.closest('#content-frame')) e.preventDefault();
    }, { passive: false });

    initSimulator();
</script>

</body>
</html>
