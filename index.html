<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Simulador Inteligente</title>
    <link rel="manifest" href="manifest.json">
    
    <style>
        /* --- RESET E BASE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; overflow: hidden; background-color: #000; }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            background: #fff;
        }

        /* --- VIEWPORT DO CONTEÚDO --- */
        .web-content {
            flex-grow: 1;
            width: 100%;
            border: none;
            position: relative;
        }
        
        #sim-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* --- ESTILOS DE NAVEGAÇÃO (FAKE BAR) --- */
        .nav-bar {
            display: flex;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        /* --- TEMA INTELIGENTE: iOS (SAFARI) --- */
        .os-ios .nav-bar {
            background: rgba(248, 248, 248, 0.82);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 0.5px solid #b5b5b5;
            padding: calc(10px + env(safe-area-inset-top)) 15px 10px 15px;
            justify-content: space-between;
        }

        .os-ios .address-field {
            background: rgba(0, 0, 0, 0.05);
            border-radius: 10px;
            height: 38px;
            flex: 1;
            margin: 0 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, sans-serif;
            font-size: 17px;
            color: #000;
        }

        .os-ios .btn-ui { color: #007aff; font-size: 20px; font-weight: 400; }

        /* --- TEMA INTELIGENTE: ANDROID (CHROME) --- */
        .os-android .nav-bar {
            background: #ffffff;
            padding: 12px 16px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .os-android .address-field {
            background: #f1f3f4;
            border-radius: 24px;
            height: 44px;
            flex: 1;
            display: flex;
            align-items: center;
            padding: 0 20px;
            font-family: 'Roboto', sans-serif;
            font-size: 16px;
            color: #202124;
        }

        .os-android .btn-ui { color: #5f6368; margin-left: 15px; font-size: 22px; }

        /* --- BARRA DE PROGRESSO (REALISMO) --- */
        #progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 2px;
            background: #1a73e8;
            width: 0%;
            transition: width 0.4s ease;
            z-index: 11;
        }
        .os-ios #progress-bar { background: #007aff; top: auto; bottom: 0; }

        /* Helpers de exibição */
        .only-ios, .only-android { display: none; }
        .os-ios .only-ios { display: block; }
        .os-android .only-android { display: block; }
    </style>
</head>
<body class="loading">

<div class="app-container" id="main-app">
    <header class="nav-bar">
        <div class="only-ios btn-ui" style="font-size: 14px;">AA</div>
        
        <div class="address-field">
            <span class="only-ios" style="margin-right: 6px; font-size: 13px;">🔒</span>
            <span id="url-text">seusite.com.br</span>
        </div>

        <div class="only-ios btn-ui">↻</div>
        <div class="only-android btn-ui">⋮</div>
        
        <div id="progress-bar"></div>
    </header>

    <main class="web-content">
        <iframe src="conteudo_do_app.php" id="sim-iframe"></iframe>
    </main>
</div>

<script>
    function applySmartTheme() {
        const ua = navigator.userAgent;
        const app = document.getElementById('main-app');
        const urlText = document.getElementById('url-text');
        
        // Inteligência de detecção
        if (/iPad|iPhone|iPod/.test(ua)) {
            app.classList.add('os-ios');
        } else {
            app.classList.add('os-android');
        }

        // Simulação de Loading ao abrir
        const bar = document.getElementById('progress-bar');
        setTimeout(() => { bar.style.width = '40%'; }, 200);
        setTimeout(() => { bar.style.width = '70%'; }, 600);
        setTimeout(() => { 
            bar.style.width = '100%'; 
            setTimeout(() => { bar.style.opacity = '0'; }, 300);
        }, 1200);
    }

    // Bloquear scroll elástico no iOS para manter o disfarce
    document.addEventListener('touchmove', function(e) {
        if (!e.target.closest('#sim-iframe')) {
            e.preventDefault();
        }
    }, { passive: false });

    window.onload = applySmartTheme;
</script>

</body>
</html>
